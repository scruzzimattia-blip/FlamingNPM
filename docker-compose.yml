services:
  flamingnpm-waf:
    build: .
    image: flamingnpm-waf:${APP_VERSION:-v0.0.0}
    container_name: flamingnpm-waf
    restart: unless-stopped
    ports:
      - "80:80"       # WAF Reverse Proxy (HTTP)
      - "443:443"     # WAF Reverse Proxy (HTTPS)
      - "8443:8443"   # Dashboard & API
    environment:
      # Wenn keine Host-Regel matcht, wird ohne BACKEND_URL eine 404 geliefert.
      # BACKEND_URL=http://example-intern:8080
      - HTTP_ADDR=:80
      - HTTPS_ADDR=:443
      # TLS_CERT_FILE=/certs/fullchain.pem
      # TLS_KEY_FILE=/certs/privkey.pem
      - API_ADDR=:8443
      - DB_PATH=/data/waf.db
      - MAX_BODY_SIZE=1048576
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW=60
      - WAF_SCORE_THRESHOLD=50
      - TZ=Europe/Zurich
    volumes:
      - waf-data:/data
      # - ./certs:/certs:ro
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge

volumes:
  waf-data:
    driver: local
