name: Release & Docker (main)

# Wird ausgeloest, wenn ein Pull Request nach main gemerged wird (Push auf main)
# oder bei direktem Push auf main.

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Go-Tests vor Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev
      - run: go test ./...
        env:
          CGO_ENABLED: "1"

  release-and-push:
    name: Versionierung, Release und Docker-Publish
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Image-Name normalisieren
        id: image_name
        run: echo "value=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Versionsnummer bestimmen
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          while IFS= read -r head_tag; do
            if [[ "${head_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "version=${head_tag}" >> "$GITHUB_OUTPUT"
              echo "new_tag=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done < <(git tag --points-at HEAD)

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"

          if [ -z "${latest_tag}" ]; then
            if [ -f VERSION ]; then
              version_file_value="$(tr -d '\n' < VERSION)"
              if [[ "${version_file_value}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                next_tag="${version_file_value}"
              else
                next_tag="v0.0.0"
              fi
            else
              next_tag="v0.0.0"
            fi
          else
            version_core="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version_core}"
            patch=$((patch + 1))
            next_tag="v${major}.${minor}.${patch}"
          fi

          echo "version=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "new_tag=true" >> "$GITHUB_OUTPUT"

      - name: Git-Tag erstellen
        if: steps.version.outputs.new_tag == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${{ steps.version.outputs.version }}`,
              sha: context.sha
            })

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: An Container-Registry anmelden
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Metadaten extrahieren
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=raw,value=main
            type=sha,prefix=git-

      - name: Docker-Image bauen und publizieren
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Release Notes generieren (alle seit letztem Tag)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          current_tag="${{ steps.version.outputs.version }}"

          # Vorherigen Tag bestimmen (der letzte semver-Tag ungleich current_tag)
          prev_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n1 || true)"

          if [ -n "${prev_tag}" ]; then
            range="${prev_tag}..HEAD"
          else
            range="HEAD"
          fi

          echo "Release Notes: current=${current_tag} prev=${prev_tag:-<none>} range=${range}"

          # PR-basierte Release Notes:
          # - ermittelt alle Commits seit prev_tag
          # - mappt Commits -> PRs via GitHub API
          # - listet unique PR-Titel + PR-Author
          # - Contributors = unique PR-Authors (nicht Commit-Author vom Merge-Commit)
          pulls_file="$(mktemp)"
          commit_fallback_file="$(mktemp)"

          mapfile -t shas < <(git rev-list ${range} || true)

          for sha in "${shas[@]}"; do
            # GitHub API: PRs zu einem Commit
            # Doku: /repos/{owner}/{repo}/commits/{commit_sha}/pulls (benoetigt spezielles Accept)
            prs_json="$(gh api \
              -H "Accept: application/vnd.github.groot-preview+json" \
              "/repos/${GITHUB_REPOSITORY}/commits/${sha}/pulls" 2>/dev/null || true)"

            pr_number="$(printf "%s" "${prs_json}" | jq -r '.[0].number // empty' 2>/dev/null || true)"
            if [ -n "${pr_number}" ]; then
              echo "${pr_number}" >> "${pulls_file}"
            else
              # Fallback: commit subject aufnehmen (nur falls kein PR gefunden wird)
              subj="$(git show -s --format=%s "${sha}" 2>/dev/null || true)"
              auth="$(git show -s --format=%an "${sha}" 2>/dev/null || true)"
              printf -- "- %s (by %s, %s)\n" "${subj}" "${auth}" "${sha:0:7}" >> "${commit_fallback_file}"
            fi
          done

          # Unique PRs
          mapfile -t pr_numbers < <(sort -u "${pulls_file}" 2>/dev/null || true)

          changes_lines="$(mktemp)"
          contributors_lines="$(mktemp)"

          for pr in "${pr_numbers[@]}"; do
            pr_info="$(gh api "/repos/${GITHUB_REPOSITORY}/pulls/${pr}" --jq '[.title, .user.login] | @tsv' 2>/dev/null || true)"
            if [ -n "${pr_info}" ]; then
              title="$(printf "%s" "${pr_info}" | awk -F'\t' '{print $1}')"
              login="$(printf "%s" "${pr_info}" | awk -F'\t' '{print $2}')"
              printf -- "- %s (#%s) (@%s)\n" "${title}" "${pr}" "${login}" >> "${changes_lines}"
              printf "%s\n" "${login}" >> "${contributors_lines}"
            else
              printf -- "- PR #%s\n" "${pr}" >> "${changes_lines}"
            fi
          done

          {
            echo "## Aenderungen"
            echo
            if [ -s "${changes_lines}" ]; then
              cat "${changes_lines}"
            elif [ -s "${commit_fallback_file}" ]; then
              cat "${commit_fallback_file}"
            else
              echo "- (Keine Aenderungen gefunden)"
            fi
            echo
            echo "## Contributors"
            echo
            if [ -s "${contributors_lines}" ]; then
              sort -u "${contributors_lines}" | sed 's/^/- @/'
            else
              # Fallback: wenn keine PRs erkannt werden konnten
              authors="$(git log ${range} --pretty=format:'%an' | sort -u || true)"
              if [ -n "${authors}" ]; then
                printf "%s\n" "${authors}" | sed 's/^/- /'
              else
                echo "- (Keine Contributors gefunden)"
              fi
            fi
            echo
            if [ -s "${commit_fallback_file}" ] && [ -s "${changes_lines}" ]; then
              echo "## Weitere Commits ohne PR-Zuordnung"
              echo
              cat "${commit_fallback_file}"
            fi
          } > release_notes.md

          rm -f "${pulls_file}" "${changes_lines}" "${contributors_lines}" "${commit_fallback_file}"

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          target_commitish: ${{ github.sha }}
