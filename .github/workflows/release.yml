name: Release & Docker (main)

# Wird ausgeloest, wenn ein Pull Request nach main gemerged wird (Push auf main)
# oder bei direktem Push auf main.

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Go-Tests vor Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev
      - run: go test ./...
        env:
          CGO_ENABLED: "1"

  release-and-push:
    name: Versionierung, Release und Docker-Publish
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Image-Name normalisieren
        id: image_name
        run: echo "value=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Versionsnummer bestimmen
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          while IFS= read -r head_tag; do
            if [[ "${head_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "version=${head_tag}" >> "$GITHUB_OUTPUT"
              echo "new_tag=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done < <(git tag --points-at HEAD)

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"

          if [ -z "${latest_tag}" ]; then
            if [ -f VERSION ]; then
              version_file_value="$(tr -d '\n' < VERSION)"
              if [[ "${version_file_value}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                next_tag="${version_file_value}"
              else
                next_tag="v0.0.0"
              fi
            else
              next_tag="v0.0.0"
            fi
          else
            version_core="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version_core}"
            patch=$((patch + 1))
            next_tag="v${major}.${minor}.${patch}"
          fi

          echo "version=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "new_tag=true" >> "$GITHUB_OUTPUT"

      - name: Git-Tag erstellen
        if: steps.version.outputs.new_tag == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${{ steps.version.outputs.version }}`,
              sha: context.sha
            })

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: An Container-Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker-Metadaten extrahieren
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.value }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=raw,value=main
            type=sha,prefix=git-

      - name: Docker-Image bauen und publizieren
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Release Notes generieren (alle seit letztem Tag)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          current_tag="${{ steps.version.outputs.version }}"

          # Vorherigen Tag bestimmen (der letzte semver-Tag ungleich current_tag)
          prev_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n1 || true)"

          if [ -n "${prev_tag}" ]; then
            range="${prev_tag}..HEAD"
          else
            range="HEAD"
          fi

          echo "Release Notes: current=${current_tag} prev=${prev_tag:-<none>} range=${range}"

          # Commits einsammeln
          mapfile -t commits < <(git log ${range} --pretty=format:'%H%x09%an%x09%s' || true)

          # Contributors (unique, alphabetisch)
          contributors="$(printf "%s\n" "${commits[@]}" | awk -F'\t' '{print $2}' | sort -u || true)"

          # Aenderungen: bevorzugt PR-Titel, sonst Commit-Subject
          # Erkennung:
          # - "Merge pull request #123 from ..."
          # - "... (#123)" (GitHub squash merge)
          changes_file="$(mktemp)"
          pr_seen_file="$(mktemp)"

          extract_pr() {
            local subject="$1"
            local pr=""

            if [[ "${subject}" =~ [Mm]erge\ pull\ request\ \#([0-9]+) ]]; then
              pr="${BASH_REMATCH[1]}"
            elif [[ "${subject}" =~ \(\#([0-9]+)\)$ ]]; then
              pr="${BASH_REMATCH[1]}"
            fi

            echo "${pr}"
          }

          for line in "${commits[@]}"; do
            sha="$(echo "${line}" | awk -F'\t' '{print $1}')"
            author="$(echo "${line}" | awk -F'\t' '{print $2}')"
            subject="$(echo "${line}" | awk -F'\t' '{print $3}')"

            pr="$(extract_pr "${subject}")"
            if [ -n "${pr}" ]; then
              if grep -qx "${pr}" "${pr_seen_file}" 2>/dev/null; then
                continue
              fi
              echo "${pr}" >> "${pr_seen_file}"

              # PR-Titel holen; falls API/Token nicht geht, fallback auf Subject
              pr_title="$(gh pr view "${pr}" --json title --jq .title 2>/dev/null || true)"
              if [ -n "${pr_title}" ]; then
                printf -- "- %s (#%s)\n" "${pr_title}" "${pr}" >> "${changes_file}"
              else
                printf -- "- %s (#%s)\n" "${subject}" "${pr}" >> "${changes_file}"
              fi
            else
              printf -- "- %s (by %s, %s)\n" "${subject}" "${author}" "${sha:0:7}" >> "${changes_file}"
            fi
          done

          {
            echo "## Aenderungen"
            echo
            if [ -s "${changes_file}" ]; then
              cat "${changes_file}"
            else
              echo "- (Keine Aenderungen gefunden)"
            fi
            echo
            echo "## Contributors"
            echo
            if [ -n "${contributors}" ]; then
              printf "%s\n" "${contributors}" | sed 's/^/- /'
            else
              echo "- (Keine Contributors gefunden)"
            fi
          } > release_notes.md

          rm -f "${changes_file}" "${pr_seen_file}"

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          target_commitish: ${{ github.sha }}
