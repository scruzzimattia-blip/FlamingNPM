name: CI

# Linting und Tests auf allen Branches ausser main sowie bei allen Pull Requests.
# Release (Docker, Version, GitHub Release) laeuft nur bei Push auf main (.github/workflows/release.yml).

on:
  push:
    branches-ignore:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (fmt, vet, test)
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Go einrichten
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build-Abhaengigkeiten fuer CGO/SQLite
        run: sudo apt-get update && sudo apt-get install -y gcc libsqlite3-dev

      - name: gofmt pruefen
        run: test -z "$(gofmt -l .)" || (gofmt -d . && exit 1)

      - name: go vet
        run: go vet ./...
        env:
          CGO_ENABLED: "1"

      - name: go test
        run: go test ./...
        env:
          CGO_ENABLED: "1"

  frontend:
    name: Frontend (Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Abhaengigkeiten installieren
        run: npm install --no-audit

      - name: Produktions-Build
        run: npm run build
