name: Bug Report
description: Ein reproduzierbares Problem melden
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke fuer die Meldung. Bitte keine **Sicherheitsluecken** hier — siehe [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: Kurzbeschreibung
      description: Was ist schiefgelaufen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduktion
      description: Schritte, um den Fehler zu sehen (inkl. Konfiguration, wenn relevant).
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Tatsaechliches Verhalten
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Umgebung
      description: z.B. Docker-Image-Tag / Git-Commit, OS, relevante Umgebungsvariablen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Relevante Zeilen aus Container-Logs oder der Konsole.
